services:
  skewt:
    build: .
    ports:
      - "8080:8080"
    environment:
      SCAN_INTERVAL_MINUTES: ${SCAN_INTERVAL_MINUTES:-5}
      SITE_CONFIG_PATH: ${SITE_CONFIG_PATH:-/data/site-config.yml}
      TZ: ${TZ:-UTC}
    volumes:
      - ./data/work:/data/work
      - ./data/output:/data/output
      - ./data/web:/data/web
      - ./site-config.yml:/data/site-config.yml:ro
    restart: unless-stopped
