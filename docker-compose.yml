services:
  skewt:
    build: .
    ports:
      - "8080:8080"
      - "2525:2525"
    environment:
      SCAN_INTERVAL_MINUTES: ${SCAN_INTERVAL_MINUTES:-5}
      ENABLE_SMTP_INGEST: ${ENABLE_SMTP_INGEST:-false}
      SMTP_PORT: ${SMTP_PORT:-2525}
      TZ: ${TZ:-UTC}
    volumes:
      - ./data/work:/data/work
      - ./data/output:/data/output
      - ./data/web:/data/web
    restart: unless-stopped
